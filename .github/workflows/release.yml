name: Release

# Builds distributable artifacts on every version tag (and on demand).
# Unsigned binaries: SmartScreen will warn on first run — documented in
# docs/ai/GOTCHAS.md; code signing is a Phase-7+ item.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create venv and install deps
        run: |
          python -m venv venv
          venv\Scripts\python.exe -m pip install --upgrade pip
          venv\Scripts\python.exe -m pip install -r requirements.txt

      - name: Smoke gate
        run: venv\Scripts\python.exe run.py --smoke

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build bundle + portable zip + installer
        run: powershell -ExecutionPolicy Bypass -File packaging\windows\build.ps1

      - name: Attach artifacts to the release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Eqho-portable-*.zip
            dist/Eqho-Setup-*.exe

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: eqho-windows
          path: |
            dist/Eqho-portable-*.zip
            dist/Eqho-Setup-*.exe

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: System deps (PortAudio, xvfb, AppImage tooling)
        run: |
          sudo apt-get update
          sudo apt-get install -y libportaudio2 xvfb libfuse2
          wget -q -O /usr/local/bin/appimagetool \
            https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage \
            && sudo chmod +x /usr/local/bin/appimagetool || echo "appimagetool unavailable"

      - name: Create venv and install deps
        run: |
          python -m venv venv
          venv/bin/pip install --upgrade pip
          venv/bin/pip install -r requirements.txt

      - name: Smoke gate (headless X)
        run: xvfb-run -a venv/bin/python run.py --smoke

      - name: Build tar.gz (+ AppImage best-effort)
        run: bash packaging/linux/build.sh

      - name: Attach artifacts to the release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Eqho-linux-*.tar.gz
            dist/Eqho-*.AppImage

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: eqho-linux
          path: |
            dist/Eqho-linux-*.tar.gz
            dist/Eqho-*.AppImage
          if-no-files-found: warn

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create venv and install deps
        run: |
          python -m venv venv
          venv/bin/pip install --upgrade pip
          venv/bin/pip install -r requirements.txt

      - name: Smoke gate
        run: venv/bin/python run.py --smoke

      - name: Build .app + dmg
        run: bash packaging/macos/build.sh

      - name: Attach artifacts to the release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Eqho-macos-*.dmg

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: eqho-macos
          path: dist/Eqho-macos-*.dmg
